{% extends 'base.html' %}



{% block content  %}
    <form  action="{% url 'notes.new' %}" method="post">
        {% csrf_token %}
        {{ form }}
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
    {% if form.errors %}
        <div class="text-red-500 mt-4 w-[100px] border h-[100px]">
            {{ form.errors.title.as_text }}
        </div>
    {% endif %}
{%  endblock %}
