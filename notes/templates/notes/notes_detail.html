{% extends 'base.html' %}
{% block content %}
    <div class="max-w-[800px] m-auto p-6">
        <a href="{% url 'notes-list' %}" class="text-blue-500 hover:text-blue-700 underline mb-6 inline-block">← Back to notes</a>
        
        <div class="bg-white rounded-xl shadow-lg p-8">
            <p class="font-bold text-gray-500 text-sm uppercase mb-1">Title</p>
            <h1 class="text-3xl font-bold mb-6">{{ note.title }}</h1>
            
            <p class="font-bold text-gray-500 text-sm uppercase mb-1">Text</p>
            <p class="text-gray-700 text-lg mb-6 leading-relaxed">{{ note.text }}</p>
            
            <p class="font-bold text-gray-500 text-sm uppercase mb-1">Likes</p>
            <p class="text-red-500 text-2xl mb-6">❤️ {{ note.likes }}</p>
            
            <p class="font-bold text-gray-500 text-sm uppercase mb-1">Created</p>
            <p class="text-gray-400 text-sm">📅 {{ note.created|date:"d.m.Y H:i" }}</p>
        </div>
    </div>
{% endblock %}
