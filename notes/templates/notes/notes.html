{% extends 'base.html' %}

    {% block content %}
    <div class="max-w-[1200px] m-auto text-center p-6">
        <h1 class="text-4xl font-bold mb-6">📝 Notes</h1>
        <a href="{% url 'welcome' %}" class="text-blue-500 hover:text-blue-700 underline mb-6 inline-block">← Go home</a>
        <div class="flex flex-wrap gap-4 text-start justify-center">
            {% for note in notes %}
            <div class="border border-gray-300 rounded-xl w-[300px] p-6 shadow-lg hover:shadow-xl transition-shadow bg-white">
                <h3 class="font-bold text-gray-500 text-sm uppercase">Title</h3>
                <p class="text-xl font-semibold mb-3">{{ note.title }}</p>
                <h3 class="font-bold text-gray-500 text-sm uppercase">Text</h3>
                <p class="text-gray-700 mb-3">{{ note.text|truncatechars:5 }}</p>
                <h3 class="font-bold text-gray-500 text-sm uppercase">Likes</h3>
                <p class="text-red-500 text-lg mb-4">❤️ {{ note.likes }}</p>
                <a href="{% url 'notes-detail' note.pk %}" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors inline-block">See detail →</a>
            </div>
            {% endfor %}
        <div class="border border-gray-300 rounded-xl w-[300px] p-6 shadow-lg hover:shadow-xl transition-shadow bg-white">
            <a href="{% url 'notes.new' %}" class="font-bold text-blue-500 text-center cursor-pointer hover:underline text-sm uppercase">Create new note</a>

            </div>
        </div>
    </div>
{% endblock %}
